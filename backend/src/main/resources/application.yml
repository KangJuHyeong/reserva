spring:
  application:
    name: reserva-backend
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  port: 8080

app:
  booking:
    code-prefix: BK
  cors:
    allowed-origins: ${FRONTEND_ORIGIN:http://localhost:3000}
    allowed-origin-patterns: ${FRONTEND_ORIGIN_PATTERNS:}
  auth:
    jwt:
      issuer: ${JWT_ISSUER:reserva}
      secret: ${JWT_SECRET:change-this-jwt-secret}
      access-token-expiry-seconds: ${JWT_ACCESS_TOKEN_EXPIRY_SECONDS:43200}
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
  dev:
    seed-demo-data: ${SEED_DEMO_DATA:false}
