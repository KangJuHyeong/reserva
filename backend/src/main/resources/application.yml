spring:
  application:
    name: reserva-backend
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  port: 8080

app:
  booking:
    code-prefix: BK
    lock-ttl-seconds: ${BOOKING_LOCK_TTL_SECONDS:5}
  cors:
    allowed-origins: ${FRONTEND_ORIGIN:http://localhost:3000}
    allowed-origin-patterns: ${FRONTEND_ORIGIN_PATTERNS:}
  auth:
    jwt:
      issuer: ${JWT_ISSUER:reserva}
      secret: ${JWT_SECRET:change-this-jwt-secret}
      access-token-expiry-seconds: ${JWT_ACCESS_TOKEN_EXPIRY_SECONDS:43200}
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
  dev:
    seed-demo-data: ${SEED_DEMO_DATA:false}
    seed-performance-data: ${SEED_PERFORMANCE_DATA:false}
    performance:
      reset-existing-data: ${PERF_RESET_DATA:false}
      creator-count: ${PERF_CREATOR_COUNT:20}
      user-count: ${PERF_USER_COUNT:300}
      event-count: ${PERF_EVENT_COUNT:1000}
      watchlists-per-user: ${PERF_WATCHLISTS_PER_USER:4}
      random-seed: ${PERF_RANDOM_SEED:20260329}
