name: deploy-ec2-semideploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-ec2-semideploy.yml"
      - "backend/**"
      - "frontend/**"
      - "infra/deploy/**"

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Normalize image names
        id: image_names
        run: |
          owner="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "frontend_image_name=${owner}/reserva-frontend" >> "$GITHUB_OUTPUT"
          echo "backend_image_name=${owner}/reserva-backend" >> "$GITHUB_OUTPUT"

      - name: Set image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image_names.outputs.frontend_image_name }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ steps.image_names.outputs.frontend_image_name }}:latest

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image_names.outputs.backend_image_name }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ steps.image_names.outputs.backend_image_name }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Normalize image names
        id: image_names
        run: |
          owner="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "frontend_image_name=${owner}/reserva-frontend" >> "$GITHUB_OUTPUT"
          echo "backend_image_name=${owner}/reserva-backend" >> "$GITHUB_OUTPUT"

      - name: Configure SSH key
        run: |
          install -m 700 -d ~/.ssh
          cat <<'EOF' > ~/.ssh/id_rsa
          ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EOF
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.EC2_PORT || 22 }}" "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          REGISTRY: ${{ env.REGISTRY }}
          FRONTEND_IMAGE_NAME: ${{ steps.image_names.outputs.frontend_image_name }}
          BACKEND_IMAGE_NAME: ${{ steps.image_names.outputs.backend_image_name }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_PORT: ${{ secrets.EC2_PORT || 22 }}
          EC2_USER: ${{ secrets.EC2_USER }}
          DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH || '/opt/reserva' }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" "
            set -eu
            cd '$DEPLOY_PATH'
            printf '%s' '$GHCR_TOKEN' | docker login '$REGISTRY' -u '$GHCR_USERNAME' --password-stdin
            FRONTEND_IMAGE='$REGISTRY/$FRONTEND_IMAGE_NAME' \
            BACKEND_IMAGE='$REGISTRY/$BACKEND_IMAGE_NAME' \
            IMAGE_TAG='$IMAGE_TAG' \
            docker compose --env-file .env -f compose.yml pull
            FRONTEND_IMAGE='$REGISTRY/$FRONTEND_IMAGE_NAME' \
            BACKEND_IMAGE='$REGISTRY/$BACKEND_IMAGE_NAME' \
            IMAGE_TAG='$IMAGE_TAG' \
            docker compose --env-file .env -f compose.yml up -d --remove-orphans
          "
