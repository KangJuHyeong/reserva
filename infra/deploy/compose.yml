name: reserva

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    mem_limit: 64m
    networks:
      - app

  backend:
    image: ${BACKEND_IMAGE}:${IMAGE_TAG}
    depends_on:
      mysql:
        condition: service_healthy
        required: false
      redis:
        condition: service_started
        required: false
    env_file:
      - ./env/backend.env
    restart: unless-stopped
    mem_limit: 384m
    networks:
      - app

  mysql:
    image: mysql:8.0
    profiles:
      - mysql
    env_file:
      - ./env/mysql.env
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    mem_limit: 512m
    networks:
      - app

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    restart: unless-stopped
    mem_limit: 128m
    networks:
      - app

volumes:
  mysql-data:

networks:
  app:
