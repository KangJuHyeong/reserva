name: reserva

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - public
      - internal

  frontend:
    image: ${FRONTEND_IMAGE}:${IMAGE_TAG}
    env_file:
      - ./env/frontend.env
    restart: unless-stopped
    networks:
      - internal

  backend:
    image: ${BACKEND_IMAGE}:${IMAGE_TAG}
    depends_on:
      mysql:
        condition: service_healthy
        required: false
    env_file:
      - ./env/backend.env
    restart: unless-stopped
    networks:
      - internal

  mysql:
    image: mysql:8.4
    profiles:
      - mysql
    env_file:
      - ./env/mysql.env
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - internal

volumes:
  mysql-data:

networks:
  public:
  internal:
